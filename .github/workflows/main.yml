name: CI

# 1. When should this run?
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 2. Pull your code into the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 3. Set up the environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 4. Install dependencies from your requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 # Tools for testing/linting

    # 5. Check for "ugly" or "bad" code (Linting)
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 6. Run your actual tests
    - name: Run tests with pytest
      run: |
        pytest